name: AI News Daily Push

on:
  schedule:
    # AI资讯：北京时间 7:00, 9:00, 11:30, 17:00, 21:00, 23:00
    - cron: '0 23 * * *'   # 北京 7:00
    - cron: '0 1 * * *'    # 北京 9:00
    - cron: '30 3 * * *'   # 北京 11:30
    - cron: '0 9 * * *'    # 北京 17:00
    - cron: '0 13 * * *'   # 北京 21:00
    - cron: '0 15 * * *'   # 北京 23:00
  workflow_dispatch: # 支持手动触发

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run news bot
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: node_modules/.bin/tsx src/index.ts
